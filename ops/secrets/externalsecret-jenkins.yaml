  namespace: jenkins
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: jenkins-pipelinehealer-bridge-secret
    creationPolicy: Owner
    template:
      metadata:
        labels:
          jenkins.io/credentials-type: secretText
        annotations:
          jenkins.io/credentials-id: "pipelinehealer-bridge-secret"
          jenkins.io/credentials-description: "PipelineHealer Jenkins bridge shared secret"
      data:
        text: "{{ .secret }}"
  data:
    - secretKey: secret
      remoteRef:
        key: jenkins-pipelinehealer-bridge-secret
